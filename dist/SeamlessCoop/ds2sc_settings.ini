[GAMEPLAY]

; Allow uninvited players ("invaders") to join your world. Personal-coop default is OFF.
; 0=FALSE  1=TRUE
allow_invaders = 0

; Apply a death debuff (DS2 already halves max HP on death; this stacks an extra mod-side effect).
; 0=FALSE  1=TRUE
death_debuffs = 1

; 0=Normal nametag | 1=None | 2=Ping | 3=Soul Level | 4=Death Count | 5=SL+Ping
overhead_player_display = 0

; Skip Bandai Namco / FromSoft / Havok splash screens.
; 0=FALSE  1=TRUE
skip_intros = 1

[SCALING]

; All per-player. Values are percentages added per extra player above 1.
; e.g. enemy_health_scaling = 35 means each extra player adds 35% to non-boss enemy HP.
; (DS2 has no posture meter, so posture knobs from DS3SC/ERSC are intentionally absent.)
; M3 implements HP scaling; damage knobs are parsed but not yet applied.

enemy_health_scaling   = 35
enemy_damage_scaling   = 0
boss_health_scaling    = 100
boss_damage_scaling    = 0

; Debug only: pretend this many players are in the session so scaling can be
; tested before online co-op exists. 1 = vanilla (no scaling). Remove once M5
; provides the live player count.
_debug_player_count    = 1

[PASSWORD]

; Required to match into the same session. Friends must share this string.
cooppassword =

[SAVE]

; Mod-side save extension. Vanilla saves (.sl2) are left untouched.
save_file_extension = co2

[NETWORK]

; Co-op coordinator (a ds3os server in DarkSouls2 mode). All friends point at
; the same one. Leave blank to stay fully offline (FromSoft servers blocked).
; Use the host's IP/hostname; for same-machine testing use 127.0.0.1.
coordinator_host =

; PEM file (next to this ini) holding the coordinator's RSA public key — copy it
; from the host's ds3os Server\Saved\default\public.key.
coordinator_pubkey_file = coordinator_pubkey.pem

; The coordinator's login port (ds3os LoginServerPort, default 50050). The
; game's hardcoded login port (50031) is rewritten to this at connect time.
coordinator_port = 50050

[LANGUAGE]

; Leave blank to use the game language. Locale files are not implemented in M1.
mod_language_override =
